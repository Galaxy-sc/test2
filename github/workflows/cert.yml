name: Generate Secure Certificate (IssueOps)

on:
  issues:
    types: [opened]

concurrency:
  group: cert-request-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build-cert:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write # این دسترسی برای کامیت کردن فایل JSON حیاتی است
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Process, Fetch Stats & Generate JSON
        id: generate
        env:
          USER_INPUT: ${{ github.actor }} 
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import urllib.request, urllib.parse, json, os, sys, re
          
          user = os.environ['USER_INPUT']
          issue_body = os.environ['ISSUE_BODY']
          issue_title = os.environ['ISSUE_TITLE']
          gh_token = os.environ['GH_TOKEN']
          
          # بررسی امنیت عنوان ایشو
          if "Cert Request" not in issue_title:
              sys.exit(0)
              
          # استخراج نام واقعی
          name_match = re.search(r'FullName:\s*(.+)', issue_body)
          real_name = name_match.group(1).strip() if name_match else user
              
          headers = {
              'User-Agent': 'OWASP-CRT-Agent',
              'Authorization': f'Bearer {gh_token}'
          }

          # تابع کمکی برای گرفتن آمار از API سرچ گیت‌هاب
          def fetch_count(query):
              url = f"https://api.github.com/search/issues?q={urllib.parse.quote(query)}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
                      return data.get('total_count', 0)
              except Exception as e:
                  print(f"::error::API Fetch Error: {e}")
                  return 0

          # دریافت آمار دقیق PRها و Issueها
          pr_count = fetch_count(f"author:{user} org:OWASP type:pr is:merged")
          issue_count = fetch_count(f"author:{user} org:OWASP type:issue")
          
          if pr_count == 0 and issue_count == 0:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"ERROR_MSG=کاربر @{user} هیچ مشارکت تایید شده‌ای (PR/Issue) در پروژه‌های OWASP ندارد.\n")
              sys.exit(1)
              
          tier = "Gold" if pr_count >= 5 else "Silver"
          cert_id = user.lower() # استفاده از یوزرنیم به عنوان شناسه یکتا
          
          # ساختار دیتای ذخیره شده
          payload = {
              "id": cert_id,
              "user": user, 
              "real_name": real_name, 
              "tier": tier, 
              "stats": {
                  "pr_count": pr_count,
                  "issue_count": issue_count,
                  "merged_commits": 0, # نیاز به GraphQL دارد
                  "lines_added": 0,    # نیاز به GraphQL دارد
                  "lines_removed": 0   # نیاز به GraphQL دارد
              }
          }
          
          # ایجاد پوشه certs در صورت عدم وجود
          os.makedirs("certs", exist_ok=True)
          
          # ذخیره فایل JSON
          file_path = f"certs/{cert_id}.json"
          with open(file_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          
          final_url = f"https://{os.environ['REPO_OWNER']}.github.io/{os.environ['REPO_NAME']}/?id={cert_id}"
          
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"CERT_URL={final_url}\n")
              f.write(f"TIER={tier}\n")
              f.write(f"COUNT={pr_count}\n")
              f.write(f"REAL_NAME={real_name}\n")
              f.write(f"CERT_ID={cert_id}\n")
        shell: python

      - name: Commit and Push JSON File
        if: success() && env.CERT_URL != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certs/${{ env.CERT_ID }}.json
          
          # اگر فایل تغییری نکرده باشد، گیت ارور می‌دهد. این خط از شکستن اکشن جلوگیری می‌کند.
          git commit -m "docs(crt): generate/update cert for @${{ github.actor }}" || echo "No changes to commit"
          git push

      - name: Comment Success & Close Issue
        if: success() && env.CERT_URL != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "### 🎉 تبریک! مدرک شما آماده و روی شبکه ذخیره شد.
          **نام ثبت شده:** ${{ env.REAL_NAME }}
          **شناسه یکتا:** \`${{ env.CERT_ID }}\`
          **سطح:** ${{ env.TIER }} (${{ env.COUNT }} مشارکت)
          
          🔗 [**>> برای مشاهده و دریافت مدرک کلیک کنید <<**](${{ env.CERT_URL }})"
          gh issue close $ISSUE --reason "completed"

      - name: Comment Failure & Close Issue
        if: failure() && env.ERROR_MSG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "❌ **صدور مدرک متوقف شد:**
          ${{ env.ERROR_MSG }}"
          gh issue close $ISSUE --reason "not planned"
