name: Generate Secure Certificate (IssueOps)

on:
  issues:
    types: [opened]

concurrency:
  group: cert-request-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build-cert:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Fetch Commits & Generate JSON
        id: generate
        env:
          USER_INPUT: ${{ github.actor }} 
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import urllib.request, urllib.parse, json, os, sys, re
          
          user = os.environ['USER_INPUT']
          issue_body = os.environ['ISSUE_BODY']
          issue_title = os.environ['ISSUE_TITLE']
          gh_token = os.environ['GH_TOKEN']
          
          if "Cert Request" not in issue_title:
              sys.exit(0)
              
          name_match = re.search(r'FullName:\s*(.+)', issue_body)
          real_name = name_match.group(1).strip() if name_match else user
              
          # استفاده از API جستجوی کامیت‌ها در کل سازمان
          query = f"author:{user} org:OWASP"
          url = f"https://api.github.com/search/commits?q={urllib.parse.quote(query)}"
          
          headers = {
              'User-Agent': 'OWASP-CRT-Agent',
              'Authorization': f'Bearer {gh_token}',
              'Accept': 'application/vnd.github+json' # هدر الزامی برای سرچ کامیت
          }

          try:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  commit_count = data.get('total_count', 0)
          except Exception as e:
              print(f"::error::API Error: {e}")
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write("ERROR_MSG=خطا در ارتباط با سرورهای گیت‌هاب.\n")
              sys.exit(1)
          
          if commit_count == 0:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"ERROR_MSG=کاربر @{user} هیچ کامیتی در پروژه‌های OWASP ندارد.\n")
              sys.exit(1)
              
          # منطق سطح‌بندی بر اساس تعداد کامیت
          if commit_count >= 50:
              tier = "Gold"
          elif commit_count >= 10:
              tier = "Silver"
          else:
              tier = "Bronze"
              
          cert_id = user.lower()
          
          payload = {
              "id": cert_id,
              "user": user, 
              "real_name": real_name, 
              "tier": tier, 
              "stats": {
                  "merged_commits": commit_count,
                  "pr_count": "--", # از کار افتاد تا لیمیت نخوریم
                  "issue_count": "--", # از کار افتاد تا لیمیت نخوریم
                  "lines_added": "--", 
                  "lines_removed": "--"
              }
          }
          
          os.makedirs("certs", exist_ok=True)
          file_path = f"certs/{cert_id}.json"
          with open(file_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          
          final_url = f"https://{os.environ['REPO_OWNER']}.github.io/{os.environ['REPO_NAME']}/?id={cert_id}"
          
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"CERT_URL={final_url}\n")
              f.write(f"TIER={tier}\n")
              f.write(f"COUNT={commit_count}\n")
              f.write(f"REAL_NAME={real_name}\n")
              f.write(f"CERT_ID={cert_id}\n")
        shell: python

      - name: Commit and Push JSON File
        if: success() && env.CERT_URL != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certs/${{ env.CERT_ID }}.json
          git commit -m "docs(crt): generate/update cert for @${{ github.actor }}" || echo "No changes to commit"
          git push

      - name: Comment Success & Close Issue
        if: success() && env.CERT_URL != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "### 🎉 تبریک! مدرک شما آماده و روی شبکه ذخیره شد.
          **نام ثبت شده:** ${{ env.REAL_NAME }}
          **شناسه یکتا:** \`${{ env.CERT_ID }}\`
          **سطح:** ${{ env.TIER }} (${{ env.COUNT }} کامیت تایید شده)
          
          🔗 [**>> برای مشاهده و دریافت مدرک کلیک کنید <<**](${{ env.CERT_URL }})"
          gh issue close $ISSUE --reason "completed"

      - name: Comment Failure & Close Issue
        if: failure() && env.ERROR_MSG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "❌ **صدور مدرک متوقف شد:**
          ${{ env.ERROR_MSG }}"
          gh issue close $ISSUE --reason "not planned"
