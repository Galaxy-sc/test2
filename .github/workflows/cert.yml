name: Generate Secure Certificate (IssueOps)

on:
  issues:
    types: [opened]

concurrency:
  group: cert-request-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build-cert:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write 
    
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: data 
          path: db_branch

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Deep Scan Commits & Generate Verifiable Report
        id: generate
        env:
          USER_INPUT: ${{ github.actor }} 
          USER_ID: ${{ github.actor_id }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import urllib.request, urllib.parse, json, os, sys, re, time
          
          user = os.environ['USER_INPUT']
          user_id = os.environ['USER_ID']
          issue_body = os.environ['ISSUE_BODY']
          issue_title = os.environ['ISSUE_TITLE']
          gh_token = os.environ['GH_TOKEN']
          
          if "Cert Request" not in issue_title:
              sys.exit(0)
              
          name_match = re.search(r'FullName:\s*(.+)', issue_body)
          real_name = name_match.group(1).strip() if name_match else user
          
          headers = {
              'User-Agent': 'OWASP-CRT-Agent',
              'Authorization': f'Bearer {gh_token}',
              'Accept': 'application/vnd.github+json'
          }

          def fetch_api(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"::warning::API Error on {url}: {e}")
                  return None

          # 1. پیدا کردن کامیت‌ها (بدون نیاز به PR و Issue)
          commit_query = f"author:{user} org:OWASP"
          commit_url = f"https://api.github.com/search/commits?q={urllib.parse.quote(commit_query)}&per_page=100"
          commit_data = fetch_api(commit_url)
          
          if not commit_data or commit_data.get('total_count', 0) == 0:
              with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                  f.write(f"ERROR_MSG=کاربر @{user} هیچ کامیتی در پروژه‌های عمومی OWASP ندارد.\n")
              sys.exit(1)
              
          total_commits = commit_data.get('total_count', 0)
          items = commit_data.get('items', [])
          
          total_added = 0
          total_removed = 0
          repo_stats = {} 
          commit_logs = [] # آرایه‌ای برای ذخیره لاگ تک‌تک کامیت‌ها
          
          print(f"[*] Found {total_commits} commits. Deep scanning lines and projects...")
          
          # 2. اسکن عمیق خطوط کد به تفکیک پروژه‌ها و کامیت‌ها
          for index, item in enumerate(items):
              repo_name = item['repository']['full_name']
              sha = item['sha']
              html_url = item['html_url']
              short_sha = sha[:7]
              
              if repo_name not in repo_stats:
                  repo_stats[repo_name] = {'commits': 0, 'added': 0, 'removed': 0}
              
              detail = fetch_api(f"https://api.github.com/repos/{repo_name}/commits/{sha}")
              added, removed = 0, 0
              if detail and 'stats' in detail:
                  added = detail['stats'].get('additions', 0)
                  removed = detail['stats'].get('deletions', 0)
                  
                  total_added += added
                  total_removed += removed
                  
                  repo_stats[repo_name]['commits'] += 1
                  repo_stats[repo_name]['added'] += added
                  repo_stats[repo_name]['removed'] += removed
              
              # ثبت لاگ دقیق همین کامیت
              commit_logs.append(f"- [`{short_sha}`]({html_url}) در **{repo_name}**: `+{added}` / `-{removed}` خط")
              
              time.sleep(0.2)
          
          total_projects = len(repo_stats)

          # 3. ساخت فاکتور لاگ (Markdown)
          report = "#### 📊 فاکتور شفاف سیستم تله‌متری\n"
          report += f"> **خلاصه:** `{total_commits}` کامیت در `{total_projects}` پروژه ⟵ (`+{total_added}` خط اضافه / `-{total_removed}` خط حذف)\n\n"
          
          report += "**تفکیک پروژه‌های درگیر (Repositories):**\n"
          for repo, stats in repo_stats.items():
              report += f"- **[{repo}](https://github.com/{repo})**: {stats['commits']} کامیت ⟵ (`+{stats['added']}` / `-{stats['removed']}`)\n"
          
          report += "\n<details>\n"
          report += "<summary><b>🔍 مشاهده جزئیات تک‌تک کامیت‌ها (کلیک کنید)</b></summary>\n\n"
          report += "\n".join(commit_logs)
          report += "\n</details>\n"

          # 4. سطح‌بندی و ذخیره
          if total_commits >= 50:
              tier = "Gold"
          elif total_commits >= 10:
              tier = "Silver"
          else:
              tier = "Bronze"
              
          cert_id = user_id
          
          # ساختار دیتابیس آپدیت شده و بهینه‌سازی شده
          payload = {
              "id": cert_id,
              "user": user, 
              "real_name": real_name, 
              "tier": tier, 
              "stats": {
                  "merged_commits": str(total_commits),
                  "project_count": str(total_projects),
                  "lines_added": str(total_added), 
                  "lines_removed": str(total_removed)
              }
          }
          
          os.makedirs("db_branch/certs", exist_ok=True)
          file_path = f"db_branch/certs/{cert_id}.json"
          with open(file_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          
          final_url = f"https://{os.environ['REPO_OWNER']}.github.io/{os.environ['REPO_NAME']}/?id={cert_id}"
          
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"CERT_URL={final_url}\n")
              f.write(f"TIER={tier}\n")
              f.write(f"COUNT={total_commits}\n")
              f.write(f"REAL_NAME={real_name}\n")
              f.write(f"CERT_ID={cert_id}\n")
              f.write("LOG_REPORT<<EOF\n")
              f.write(report)
              f.write("\nEOF\n")
        shell: python

      - name: Commit and Push JSON to Data Branch
        if: success() && env.CERT_URL != ''
        run: |
          cd db_branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certs/${{ env.CERT_ID }}.json
          git commit -m "db(crt): save cert data for @${{ github.actor }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin data
          git push origin data

      - name: Comment Success & Close Issue
        if: success() && env.CERT_URL != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "### 🎉 تبریک! مدرک شما صادر شد.
          **نام ثبت شده:** ${{ env.REAL_NAME }}
          **شناسه یکتا:** \`${{ env.CERT_ID }}\`
          **سطح:** ${{ env.TIER }}
          
          🔗 [**>> برای مشاهده و دریافت مدرک کلیک کنید <<**](${{ env.CERT_URL }})
          
          ---
          ${{ env.LOG_REPORT }}"
          gh issue close $ISSUE --reason "completed"

      - name: Comment Failure & Close Issue
        if: failure() && env.ERROR_MSG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "❌ **صدور مدرک متوقف شد:**
          ${{ env.ERROR_MSG }}"
          gh issue close $ISSUE --reason "not planned"
