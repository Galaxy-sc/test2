name: Generate Secure Certificate (IssueOps)

on:
  issues:
    types: [opened]

concurrency:
  group: cert-request-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build-cert:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write 
    
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: data 
          path: db_branch

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Fetch Hybrid Stats & Generate JSON
        id: generate
        env:
          USER_INPUT: ${{ github.actor }} 
          USER_ID: ${{ github.actor_id }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import urllib.request, urllib.parse, json, os, sys, re
          
          user = os.environ['USER_INPUT']
          user_id = os.environ['USER_ID']
          issue_body = os.environ['ISSUE_BODY']
          issue_title = os.environ['ISSUE_TITLE']
          gh_token = os.environ['GH_TOKEN']
          
          if "Cert Request" not in issue_title:
              sys.exit(0)
              
          name_match = re.search(r'FullName:\s*(.+)', issue_body)
          real_name = name_match.group(1).strip() if name_match else user
          
          # هدرهای مجزا برای دو نوع API
          rest_headers = {
              'User-Agent': 'OWASP-CRT-REST',
              'Authorization': f'Bearer {gh_token}',
              'Accept': 'application/vnd.github+json'
          }
          
          graphql_headers = {
              'Authorization': f'Bearer {gh_token}',
              'Content-Type': 'application/json',
              'User-Agent': 'OWASP-CRT-GraphQL'
          }

          # ---------------------------------------------------------
          # 1. گرفتن تعداد دقیق کامیت‌ها با REST API (دقیق‌ترین روش)
          # ---------------------------------------------------------
          query = f"author:{user} org:OWASP"
          commit_url = f"https://api.github.com/search/commits?q={urllib.parse.quote(query)}"
          
          try:
              req = urllib.request.Request(commit_url, headers=rest_headers)
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  exact_commit_count = data.get('total_count', 0)
          except Exception as e:
              print(f"::error::REST API Error: {e}")
              sys.exit(1)

          if exact_commit_count == 0:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"ERROR_MSG=کاربر @{user} هیچ کامیتی در پروژه‌های عمومی OWASP ندارد.\n")
              sys.exit(1)

          # ---------------------------------------------------------
          # 2. گرفتن آمار خطوط کد، PRها و Issueها با GraphQL
          # ---------------------------------------------------------
          def run_graphql(query, variables):
              payload = json.dumps({'query': query, 'variables': variables}).encode('utf-8')
              req = urllib.request.Request('https://api.github.com/graphql', data=payload, headers=graphql_headers)
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"::warning::GraphQL Error (Skipping detailed stats): {e}")
                  return None

          # شمارش Issueها
          issue_query = """
          query($searchQ: String!) {
            search(query: $searchQ, type: ISSUE, first: 1) { issueCount }
          }
          """
          issue_data = run_graphql(issue_query, {"searchQ": f"author:{user} org:OWASP type:issue"})
          total_issues = issue_data['data']['search']['issueCount'] if issue_data else 0

          # شمارش PRها و استخراج خطوط کد
          pr_query = """
          query($searchQ: String!, $cursor: String) {
            search(query: $searchQ, type: ISSUE, first: 100, after: $cursor) {
              issueCount
              pageInfo { hasNextPage endCursor }
              nodes {
                ... on PullRequest { additions deletions }
              }
            }
          }
          """
          
          has_next_page = True
          cursor = None
          total_prs = 0
          total_added = 0
          total_removed = 0

          while has_next_page:
              pr_data = run_graphql(pr_query, {"searchQ": f"author:{user} org:OWASP type:pr is:merged", "cursor": cursor})
              if not pr_data: break
              
              search_res = pr_data['data']['search']
              total_prs = search_res['issueCount']
              
              for node in search_res['nodes']:
                  if not node: continue
                  total_added += node.get('additions', 0)
                  total_removed += node.get('deletions', 0)
                  
              has_next_page = search_res['pageInfo']['hasNextPage']
              cursor = search_res['pageInfo']['endCursor']

          # ---------------------------------------------------------
          # 3. ارزیابی نهایی و ساخت دیتابیس
          # ---------------------------------------------------------
          if exact_commit_count >= 50:
              tier = "Gold"
          elif exact_commit_count >= 10:
              tier = "Silver"
          else:
              tier = "Bronze"
              
          cert_id = user_id
          
          payload = {
              "id": cert_id,
              "user": user, 
              "real_name": real_name, 
              "tier": tier, 
              "stats": {
                  "merged_commits": str(exact_commit_count),
                  "pr_count": str(total_prs),
                  "issue_count": str(total_issues),
                  "lines_added": str(total_added), 
                  "lines_removed": str(total_removed)
              }
          }
          
          os.makedirs("db_branch/certs", exist_ok=True)
          file_path = f"db_branch/certs/{cert_id}.json"
          with open(file_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          
          final_url = f"https://{os.environ['REPO_OWNER']}.github.io/{os.environ['REPO_NAME']}/?id={cert_id}"
          
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"CERT_URL={final_url}\n")
              f.write(f"TIER={tier}\n")
              f.write(f"COUNT={exact_commit_count}\n")
              f.write(f"REAL_NAME={real_name}\n")
              f.write(f"CERT_ID={cert_id}\n")
        shell: python

      - name: Commit and Push JSON to Data Branch
        if: success() && env.CERT_URL != ''
        run: |
          cd db_branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certs/${{ env.CERT_ID }}.json
          git commit -m "db(crt): save cert data for @${{ github.actor }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin data
          git push origin data

      - name: Comment Success & Close Issue
        if: success() && env.CERT_URL != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "### 🎉 تبریک! مدرک شما صادر شد.
          **نام ثبت شده:** ${{ env.REAL_NAME }}
          **شناسه یکتا:** \`${{ env.CERT_ID }}\`
          **سطح:** ${{ env.TIER }} (${{ env.COUNT }} کامیت تایید شده)
          
          🔗 [**>> برای مشاهده و دریافت مدرک کلیک کنید <<**](${{ env.CERT_URL }})"
          gh issue close $ISSUE --reason "completed"

      - name: Comment Failure & Close Issue
        if: failure() && env.ERROR_MSG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "❌ **صدور مدرک متوقف شد:**
          ${{ env.ERROR_MSG }}"
          gh issue close $ISSUE --reason "not planned"
