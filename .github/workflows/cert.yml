name: Generate Secure Certificate (IssueOps)

on:
  issues:
    types: [opened]

concurrency:
  group: cert-request-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build-cert:
    # Workflow will only trigger if the issue title contains "Cert Request"
    if: contains(github.event.issue.title, 'Cert Request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write 
    
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: data 
          path: db_branch

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: GraphQL Deep Scan & Generate Report
        id: generate
        env:
          USER_INPUT: ${{ github.actor }} 
          USER_ID: ${{ github.actor_id }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          import urllib.request, json, os, sys, re, time
          
          user = os.environ['USER_INPUT']
          user_id = os.environ['USER_ID']
          issue_body = os.environ['ISSUE_BODY']
          gh_token = os.environ['GH_TOKEN']
              
          name_match = re.search(r'FullName:\s*(.+)', issue_body)
          real_name = name_match.group(1).strip() if name_match else user

          # --- 1. Anti-Spam & Cooldown System (24 Hours) ---
          cooldown_seconds = 24 * 3600
          cert_path = f"db_branch/certs/{user_id}.json"
          if os.path.exists(cert_path):
              with open(cert_path, "r", encoding="utf-8") as f:
                  try:
                      old_data = json.load(f)
                      last_issued = old_data.get("last_issued", 0)
                      time_passed = time.time() - last_issued
                      
                      if time_passed < cooldown_seconds:
                          hours_left = int((cooldown_seconds - time_passed) / 3600)
                          mins_left = int(((cooldown_seconds - time_passed) % 3600) / 60)
                          error_msg = f"⏳ **System Limit:** You have recently updated your certificate. Please try again in {hours_left} hours and {mins_left} minutes."
                          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env_file:
                              env_file.write(f"ERROR_MSG={error_msg}\n")
                          sys.exit(1)
                  except:
                      pass
          # -------------------------------------------------
          
          headers = {
              'Authorization': f'Bearer {gh_token}',
              'Content-Type': 'application/json',
              'User-Agent': 'OWASP-CRT-GraphQL'
          }

          def run_graphql(query, variables=None):
              payload = json.dumps({'query': query, 'variables': variables or {}}).encode('utf-8')
              req = urllib.request.Request('https://api.github.com/graphql', data=payload, headers=headers)
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"::error::GraphQL Error: {e}")
                  with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                      f.write(f"ERROR_MSG=❌ Connection to the GraphQL server was lost. Please verify that the PAT token is set.\n")
                  sys.exit(1)

          # --- 2. Get User's GraphQL Node ID ---
          id_query = """query($login: String!) { user(login: $login) { id } }"""
          id_res = run_graphql(id_query, {"login": user})
          
          if not id_res or 'errors' in id_res or not id_res.get('data', {}).get('user'):
              with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                  f.write(f"ERROR_MSG=❌ User @{user} was not found in GitHub's GraphQL system.\n")
              sys.exit(1)
              
          graphql_author_id = id_res['data']['user']['id']

          # --- 3. Main Query for Data Extraction ---
          main_query = """
          query($login: String!, $authorId: ID!) {
            rateLimit { cost remaining limit }
            user(login: $login) {
              repositoriesContributedTo(first: 100, contributionTypes: [COMMIT]) {
                edges {
                  node {
                    name
                    owner { login }
                    defaultBranchRef {
                      target {
                        ... on Commit {
                          history(author: { id: $authorId }, first: 100) {
                            edges {
                              node { oid message additions deletions committedDate }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          """
          
          print(f"[*] Fetching deep stats for @{user} via GraphQL...")
          data_res = run_graphql(main_query, {"login": user, "authorId": graphql_author_id})
          
          limit_info = data_res.get('data', {}).get('rateLimit', {})
          print(f"💸 Query Cost: {limit_info.get('cost')} | 🔋 Remaining: {limit_info.get('remaining')}/{limit_info.get('limit')}")

          contributed_repos = data_res.get('data', {}).get('user', {}).get('repositoriesContributedTo', {}).get('edges', [])
          
          total_commits = 0
          total_added = 0
          total_removed = 0
          repo_stats = {}
          commit_logs = []
          first_commit_date = None

          for repo_edge in contributed_repos:
              repo_node = repo_edge.get('node', {})
              repo_owner = repo_node.get('owner', {}).get('login', '')
              repo_name = f"{repo_owner}/{repo_node.get('name', '')}"
              
              if repo_owner.upper() != 'OWASP':
                  continue
                  
              branch_ref = repo_node.get('defaultBranchRef')
              if not branch_ref: continue
                  
              commit_history = branch_ref.get('target', {}).get('history', {}).get('edges', [])
              if not commit_history: continue

              if repo_name not in repo_stats:
                  repo_stats[repo_name] = {'commits': 0, 'added': 0, 'removed': 0}

              for commit_edge in commit_history:
                  commit = commit_edge['node']
                  sha = commit['oid'][:7]
                  added = commit['additions']
                  removed = commit['deletions']
                  c_date = commit['committedDate'] # Format: 2023-01-01T12:00:00Z
                  
                  # Compare dates as strings (ISO 8601 format allows string comparison) to find the oldest
                  if not first_commit_date or c_date < first_commit_date:
                      first_commit_date = c_date
                  
                  total_commits += 1
                  total_added += added
                  total_removed += removed
                  
                  repo_stats[repo_name]['commits'] += 1
                  repo_stats[repo_name]['added'] += added
                  repo_stats[repo_name]['removed'] += removed
                  
                  commit_url = f"https://github.com/{repo_name}/commit/{commit['oid']}"
                  commit_logs.append(f"- [{sha}]({commit_url}) in **{repo_name}**: +{added} / -{removed} lines")

          total_projects = len(repo_stats)

          if total_commits == 0:
              with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                  f.write(f"ERROR_MSG=User @{user} has no verified commits in the default branch of public OWASP projects.\n")
              sys.exit(1)

          # Extract just the Date part (YYYY-MM-DD) from ISO format
          first_commit_display = first_commit_date.split('T')[0] if first_commit_date else "N/A"

          # --- 4. Generate Final Report ---
          report = "#### 📊 Transparent Telemetry System Factor (Powered by GraphQL)\n"
          report += f"> **Summary:** {total_commits} commits across {total_projects} projects ⟵ (+{total_added} lines added / -{total_removed} lines removed)\n\n"
          
          report += "**Breakdown of Involved Projects (Repositories):**\n"
          for repo, stats in repo_stats.items():
              report += f"- **[{repo}](https://github.com/{repo})**: {stats['commits']} commits ⟵ (+{stats['added']} / -{stats['removed']})\n"
          
          report += "\n<details>\n"
          report += "<summary><b>🔍 View Individual Commit Details (Click to Expand)</b></summary>\n\n"
          report += "\n".join(commit_logs)
          report += "\n</details>\n"

          # --- 5. Save to Database ---
          if total_commits >= 50: tier = "Gold"
          elif total_commits >= 10: tier = "Silver"
          else: tier = "Bronze"
              
          cert_id = user_id
          
          payload = {
              "id": cert_id,
              "user": user, 
              "real_name": real_name, 
              "tier": tier, 
              "last_issued": int(time.time()),
              "stats": {
                  "first_commit_date": first_commit_display,
                  "merged_commits": str(total_commits),
                  "project_count": str(total_projects),
                  "lines_added": str(total_added), 
                  "lines_removed": str(total_removed)
              }
          }
          
          os.makedirs("db_branch/certs", exist_ok=True)
          file_path = f"db_branch/certs/{cert_id}.json"
          with open(file_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          
          final_url = f"https://{os.environ['REPO_OWNER']}.github.io/{os.environ['REPO_NAME']}/?id={cert_id}"
          
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"CERT_URL={final_url}\n")
              f.write(f"TIER={tier}\n")
              f.write(f"REAL_NAME={real_name}\n")
              f.write(f"CERT_ID={cert_id}\n")
              f.write(f"FIRST_COMMIT={first_commit_display}\n")
              f.write("LOG_REPORT<<EOF\n")
              f.write(report)
              f.write("\nEOF\n")
        shell: python

      - name: Commit and Push JSON to Data Branch
        if: success() && env.CERT_URL != ''
        run: |
          cd db_branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certs/${{ env.CERT_ID }}.json
          git commit -m "db(crt): save cert data for @${{ github.actor }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin data
          git push origin data

      - name: Comment Success & Close Issue
        if: success() && env.CERT_URL != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "### 🎉 Congratulations! Your certificate has been issued/updated.
          **Registered Name:** ${{ env.REAL_NAME }}
          **Unique ID:** \`${{ env.CERT_ID }}\`
          **First Contribution:** ${{ env.FIRST_COMMIT }}
          **Tier:** ${{ env.TIER }}
          
          🔗 [**>> Click Here to View and Download Certificate <<**](${{ env.CERT_URL }})
          
          ---
          ${{ env.LOG_REPORT }}"
          gh issue close $ISSUE --reason "completed"

      - name: Comment Failure & Close Issue
        if: failure() && env.ERROR_MSG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE --body "${{ env.ERROR_MSG }}"
          gh issue close $ISSUE --reason "not planned"
