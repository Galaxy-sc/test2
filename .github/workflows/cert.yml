- name: Fetch Commits & Generate JSON
        id: generate
        env:
          USER_INPUT: ${{ github.actor }}
          USER_ID: ${{ github.actor_id }} # اضافه شدن شناسه عددی ثابت کاربر
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import urllib.request, urllib.parse, json, os, sys, re
          
          user = os.environ['USER_INPUT']
          user_id = os.environ['USER_ID'] # دریافت ID
          issue_body = os.environ['ISSUE_BODY']
          issue_title = os.environ['ISSUE_TITLE']
          gh_token = os.environ['GH_TOKEN']
          
          if "Cert Request" not in issue_title:
              sys.exit(0)
              
          name_match = re.search(r'FullName:\s*(.+)', issue_body)
          real_name = name_match.group(1).strip() if name_match else user
              
          query = f"author:{user} org:OWASP"
          url = f"https://api.github.com/search/commits?q={urllib.parse.quote(query)}"
          
          headers = {
              'User-Agent': 'OWASP-CRT-Agent',
              'Authorization': f'Bearer {gh_token}',
              'Accept': 'application/vnd.github+json'
          }

          try:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  commit_count = data.get('total_count', 0)
          except Exception as e:
              print(f"::error::API Error Details: {e}")
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write("ERROR_MSG=خطا در ارتباط با سرورهای گیت‌هاب.\n")
              sys.exit(1)
          
          if commit_count == 0:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"ERROR_MSG=کاربر @{user} هیچ کامیتی در پروژه‌های عمومی OWASP ندارد.\n")
              sys.exit(1)
              
          if commit_count >= 50:
              tier = "Gold"
          elif commit_count >= 10:
              tier = "Silver"
          else:
              tier = "Bronze"
              
          # شناسه مدرک حالا شناسه عددی غیرقابل جعل گیت‌هاب است
          cert_id = user_id
          
          payload = {
              "id": cert_id,
              "user": user, # یوزرنیم فعلی هم ذخیره می‌شود تا در مدرک نمایش داده شود
              "real_name": real_name, 
              "tier": tier, 
              "stats": {
                  "merged_commits": commit_count,
                  "pr_count": "--",
                  "issue_count": "--",
                  "lines_added": "--", 
                  "lines_removed": "--"
              }
          }
          
          os.makedirs("db_branch/certs", exist_ok=True)
          file_path = f"db_branch/certs/{cert_id}.json"
          with open(file_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          
          final_url = f"https://{os.environ['REPO_OWNER']}.github.io/{os.environ['REPO_NAME']}/?id={cert_id}"
          
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"CERT_URL={final_url}\n")
              f.write(f"TIER={tier}\n")
              f.write(f"COUNT={commit_count}\n")
              f.write(f"REAL_NAME={real_name}\n")
              f.write(f"CERT_ID={cert_id}\n")
        shell: python
